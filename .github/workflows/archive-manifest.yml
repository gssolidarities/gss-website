name: Rebuild archive manifest

# Whenever something inside archive-items/ changes, scan the folder and
# regenerate manifest.json so the public Archive page automatically shows
# the new content.

on:
  push:
    branches: [main]
    paths:
      - "archive-items/**"
      - "scripts/build_archive_manifest.py"
      - ".github/workflows/archive-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-manifest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Use a PAT or default GITHUB_TOKEN; default token can push back
          # to the same branch as long as repo policy allows it.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build manifest
        run: python3 scripts/build_archive_manifest.py

      - name: Commit manifest if changed
        run: |
          if git diff --quiet archive-items/manifest.json; then
            echo "Manifest unchanged. Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive-items/manifest.json
          git commit -m "chore(archive): regenerate manifest [skip ci]"
          git push
